<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hồ sơ bác sĩ – BV Mắt PTIT</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="../css/variables.css" rel="stylesheet">
  <link href="../css/base.css" rel="stylesheet">
  <link href="../css/components.css" rel="stylesheet">
  <link href="../css/layout.css" rel="stylesheet">
</head>
<body>
<div class="app-shell">

  <aside class="sidebar">
    <a href="dashboard.html" class="sidebar-brand">
      <div class="brand-logo">
        <svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:#fff" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zm0 12.5a5 5 0 1 1 0-10 5 5 0 0 1 0 10zm0-8a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"/>
        </svg>
      </div>
      <div class="brand-text">BV Mắt PTIT<small>Cổng Bác Sĩ</small></div>
    </a>
    <nav class="sidebar-nav">
      <div class="nav-item"><a href="dashboard.html" class="nav-link-h"><span class="nav-icon"><i class="fas fa-house"></i></span><span class="nav-label">Tổng quan</span></a></div>
      <div class="nav-section-label">Lịch khám</div>
      <div class="nav-item"><a href="schedule.html" class="nav-link-h"><span class="nav-icon"><i class="fas fa-calendar-days"></i></span><span class="nav-label">Lịch theo ngày</span></a></div>
      <div class="nav-item"><a href="patient-list.html" class="nav-link-h"><span class="nav-icon"><i class="fas fa-users"></i></span><span class="nav-label">Danh sách bệnh nhân</span></a></div>
      <div class="nav-section-label">Tài khoản</div>
      <div class="nav-item"><a href="profile.html" class="nav-link-h active"><span class="nav-icon"><i class="fas fa-user-doctor"></i></span><span class="nav-label">Hồ sơ bác sĩ</span></a></div>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="avatar avatar-md" style="background:var(--primary-light)">TM</div>
        <div class="user-info"><div class="user-name">BS. Trần Thị Mai</div><div class="user-role">Giác mạc · GS.TS</div></div>
      </div>
    </div>
  </aside>

  <main class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <button class="topbar-icon-btn" id="sidebarToggle"><i class="fas fa-bars"></i></button>
        <div><div class="topbar-title">Hồ sơ bác sĩ</div></div>
      </div>
      <div class="topbar-right">
        <button class="topbar-icon-btn"><i class="fas fa-bell"></i><span class="notif-dot"></span></button>
        <button class="topbar-user">
          <div class="avatar avatar-sm" style="background:var(--primary-light)">TM</div>
          <div class="user-details d-none d-md-block"><span class="user-name">BS. Trần Thị Mai</span><span class="user-role">Bác sĩ</span></div>
        </button>
      </div>
    </header>

    <div class="content-area">
      <div class="tab-nav-h">
        <button class="tab-btn active" onclick="switchTab(this,'tabInfo')"><i class="fas fa-id-badge" style="margin-right:6px"></i>Thông tin nghề nghiệp</button>
        <button class="tab-btn" onclick="switchTab(this,'tabPassword')"><i class="fas fa-lock" style="margin-right:6px"></i>Đổi mật khẩu</button>
      </div>

      <div class="tab-pane-h active" id="tabInfo">
        <div class="card-hospital" style="max-width:700px">
          <div class="card-header-h">
            <h5>Thông tin bác sĩ</h5>
            <button class="btn-hospital btn-outline-h btn-sm" id="editToggle" onclick="toggleEdit()"><i class="fas fa-pen"></i> Chỉnh sửa</button>
          </div>
          <div class="card-body-h">
            <div style="display:flex;align-items:center;gap:16px;margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid var(--border)">
              <div class="avatar" style="width:72px;height:72px;font-size:24px;background:var(--primary-light)">TM</div>
              <div>
                <div style="font-size:var(--font-xl);font-weight:700">BS. Trần Thị Mai</div>
                <div style="font-size:var(--font-sm);color:var(--text-muted)">Chuyên khoa Giác mạc · GS.TS · BS-001</div>
              </div>
            </div>
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label-h">Chuyên khoa</label>
                <input class="form-control-h" id="specialty" value="Giác mạc" disabled>
              </div>
              <div class="col-md-6">
                <label class="form-label-h">Học hàm / Học vị</label>
                <input class="form-control-h" id="degree" value="GS.TS" disabled>
              </div>
              <div class="col-md-6">
                <label class="form-label-h">Số điện thoại</label>
                <input class="form-control-h" id="phone" value="0912 000 111" disabled>
              </div>
              <div class="col-md-6">
                <label class="form-label-h">Email</label>
                <input class="form-control-h" id="email" value="bs.tranmai@bvmatptit.edu.vn" disabled>
              </div>
              <div class="col-12">
                <label class="form-label-h">Giới thiệu bản thân</label>
                <textarea class="form-control-h" id="bio" rows="4" disabled>GS.TS Trần Thị Mai là chuyên gia hàng đầu về bệnh lý giác mạc với hơn 25 năm kinh nghiệm. Tốt nghiệp PTIT và hoàn thành nghiên cứu sinh tại Đại học Osaka, Nhật Bản. Đặc biệt có chuyên môn sâu về ghép giác mạc và điều trị viêm giác mạc tự miễn.</textarea>
              </div>
            </div>
          </div>
          <div class="card-footer-h" id="saveFooter" style="display:none">
            <button class="btn-hospital btn-ghost-h btn-sm" onclick="cancelEdit()">Hủy</button>
            <button class="btn-hospital btn-primary-h btn-sm" onclick="saveInfo()"><i class="fas fa-check"></i> Lưu thay đổi</button>
          </div>
        </div>
      </div>

      <div class="tab-pane-h" id="tabPassword">
        <div class="card-hospital" style="max-width:500px">
          <div class="card-header-h"><h5>Đổi mật khẩu</h5></div>
          <div class="card-body-h">
            <div class="form-group-h">
              <label class="form-label-h">Mật khẩu hiện tại <span class="required">*</span></label>
              <input class="form-control-h" type="password" id="oldPwd" placeholder="Nhập mật khẩu hiện tại">
            </div>
            <div class="form-group-h">
              <label class="form-label-h">Mật khẩu mới <span class="required">*</span></label>
              <input class="form-control-h" type="password" id="newPwd" placeholder="Tối thiểu 8 ký tự">
            </div>
            <div class="form-group-h">
              <label class="form-label-h">Xác nhận mật khẩu mới <span class="required">*</span></label>
              <input class="form-control-h" type="password" id="confirmPwd" placeholder="Nhập lại mật khẩu mới">
              <div id="matchHint" style="font-size:12px;margin-top:4px"></div>
            </div>
            <button class="btn-hospital btn-primary-h" onclick="changePassword()"><i class="fas fa-shield-halved"></i> Cập nhật mật khẩu</button>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="../js/sidebar.js"></script>
<script src="../js/doctor-profile.js"></script>
</body>
</html>
