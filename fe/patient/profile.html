<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thông tin cá nhân – BV Mắt PTIT</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="../css/variables.css" rel="stylesheet">
  <link href="../css/base.css" rel="stylesheet">
  <link href="../css/components.css" rel="stylesheet">
  <link href="../css/layout.css" rel="stylesheet">
</head>
<body>
<div class="app-shell">

  <aside class="sidebar">
    <a href="" class="sidebar-brand">
      <div class="brand-logo"><svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:#fff" xmlns="http://www.w3.org/2000/svg"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zm0 12.5a5 5 0 1 1 0-10 5 5 0 0 1 0 10zm0-8a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"/></svg></div>
      <div class="brand-text">BV Mắt PTIT<small>Cổng Bệnh Nhân</small></div>
    </a>
    <nav class="sidebar-nav">
      <div class="nav-item">
        <a href="dashboard.html" class="nav-link-h">
          <span class="nav-icon"><i class="fas fa-house"></i></span>
          <span class="nav-label">Tổng quan</span>
        </a>
      </div>
      <div class="nav-section-label">Lịch khám</div>
      <div class="nav-item">
        <a href="../book-appointment.html" class="nav-link-h">
          <span class="nav-icon"><i class="fas fa-calendar-plus"></i></span>
          <span class="nav-label">Đặt lịch mới</span>
        </a>
      </div>
      <div class="nav-item">
        <a href="appointments.html" class="nav-link-h">
          <span class="nav-icon"><i class="fas fa-calendar-days"></i></span>
          <span class="nav-label">Lịch hẹn của tôi</span>
          <span class="nav-badge">1</span>
        </a>
      </div>
      <div class="nav-section-label">Hồ sơ</div>
      <div class="nav-item">
        <a href="history.html" class="nav-link-h">
          <span class="nav-icon"><i class="fas fa-notes-medical"></i></span>
          <span class="nav-label">Bệnh án của tôi</span>
        </a>
      </div>
      <div class="nav-item">
        <a href="invoices.html" class="nav-link-h">
          <span class="nav-icon"><i class="fas fa-file-invoice-dollar"></i></span>
          <span class="nav-label">Hóa đơn thanh toán</span>
        </a>
      </div>
      <div class="nav-section-label">Tài khoản</div>
      <div class="nav-item">
        <a href="profile.html" class="nav-link-h active">
          <span class="nav-icon"><i class="fas fa-user-circle"></i></span>
          <span class="nav-label">Thông tin cá nhân</span>
        </a>
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="avatar avatar-md">VA</div>
        <div class="user-info">
          <div class="user-name">Nguyễn Văn An</div>
          <div class="user-role">Bệnh nhân</div>
        </div>
      </div>
    </div>
  </aside>

  <main class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <button class="topbar-icon-btn" id="sidebarToggle"><i class="fas fa-bars"></i></button>
        <div>
          <div class="topbar-title">Thông tin cá nhân</div>
          <div style="font-size:12px;color:var(--text-muted)">Quản lý hồ sơ và bảo mật tài khoản</div>
        </div>
      </div>
      <div class="topbar-right">
        <button class="topbar-icon-btn">
          <i class="fas fa-bell"></i><span class="notif-dot"></span>
        </button>
        <button class="topbar-user">
          <div class="avatar avatar-sm">VA</div>
          <div class="user-details d-none d-md-block">
            <span class="user-name">Nguyễn Văn An</span>
            <span class="user-role">Bệnh nhân</span>
          </div>
        </button>
      </div>
    </header>

    <div class="content-area">
      <div class="tab-nav-h">
        <button class="tab-btn active" onclick="switchTab(this,'tabInfo')">
          <i class="fas fa-id-card" style="margin-right:6px"></i>Thông tin cá nhân
        </button>
        <button class="tab-btn" onclick="switchTab(this,'tabPassword')">
          <i class="fas fa-lock" style="margin-right:6px"></i>Đổi mật khẩu
        </button>
      </div>

      <!-- Tab: Thông tin cá nhân -->
      <div class="tab-pane-h active" id="tabInfo">
        <div class="card-hospital" style="max-width:700px">
          <div class="card-header-h">
            <h5>Hồ sơ bệnh nhân</h5>
            <button class="btn-hospital btn-outline-h btn-sm" id="editToggle" onclick="toggleEdit()">
              <i class="fas fa-pen"></i> Chỉnh sửa
            </button>
          </div>
          <div class="card-body-h">
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label-h">Họ và tên <span class="required">*</span></label>
                <input class="form-control-h" id="fullName" value="Nguyễn Văn An" disabled>
              </div>
              <div class="col-md-6">
                <label class="form-label-h">Số CCCD</label>
                <input class="form-control-h" id="cccd" value="012345678901" disabled>
              </div>
              <div class="col-md-6">
                <label class="form-label-h">Ngày sinh</label>
                <input class="form-control-h" id="dob" type="date" value="1990-05-15" disabled>
              </div>
              <div class="col-md-6">
                <label class="form-label-h">Giới tính</label>
                <select class="form-control-h" id="gender" disabled>
                  <option value="male" selected>Nam</option>
                  <option value="female">Nữ</option>
                  <option value="other">Khác</option>
                </select>
              </div>
              <div class="col-md-6">
                <label class="form-label-h">Số điện thoại</label>
                <input class="form-control-h" id="phone" value="0912 345 678" disabled>
              </div>
              <div class="col-12">
                <label class="form-label-h">Địa chỉ</label>
                <input class="form-control-h" id="address" value="123 Phố Huế, Hai Bà Trưng, Hà Nội" disabled>
              </div>
              <div class="col-12">
                <label class="form-label-h">Ghi chú (dị ứng, tiền sử bệnh...)</label>
                <textarea class="form-control-h" id="notes" rows="3" disabled>Dị ứng phấn hoa. Tiền sử cận thị từ năm 2010.</textarea>
              </div>
            </div>
          </div>
          <div class="card-footer-h" id="saveFooter" style="display:none">
            <button class="btn-hospital btn-ghost-h btn-sm" onclick="cancelEdit()">Hủy</button>
            <button class="btn-hospital btn-primary-h btn-sm" onclick="saveInfo()"><i class="fas fa-check"></i> Lưu thay đổi</button>
          </div>
        </div>
      </div>

      <!-- Tab: Đổi mật khẩu -->
      <div class="tab-pane-h" id="tabPassword">
        <div class="card-hospital" style="max-width:500px">
          <div class="card-header-h"><h5>Đổi mật khẩu</h5></div>
          <div class="card-body-h">
            <div class="form-group-h">
              <label class="form-label-h">Mật khẩu hiện tại <span class="required">*</span></label>
              <input class="form-control-h" type="password" id="oldPwd" placeholder="Nhập mật khẩu hiện tại">
            </div>
            <div class="form-group-h">
              <label class="form-label-h">Mật khẩu mới <span class="required">*</span></label>
              <input class="form-control-h" type="password" id="newPwd" placeholder="Tối thiểu 8 ký tự">
              <div id="pwdHint" style="font-size:12px;color:var(--text-muted);margin-top:4px">Ít nhất 8 ký tự</div>
            </div>
            <div class="form-group-h">
              <label class="form-label-h">Xác nhận mật khẩu mới <span class="required">*</span></label>
              <input class="form-control-h" type="password" id="confirmPwd" placeholder="Nhập lại mật khẩu mới">
              <div id="matchHint" style="font-size:12px;margin-top:4px"></div>
            </div>
            <button class="btn-hospital btn-primary-h" onclick="changePassword()">
              <i class="fas fa-shield-halved"></i> Cập nhật mật khẩu
            </button>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="../js/sidebar.js"></script>
<script src="../js/patient-profile.js"></script>
</body>
</html>
