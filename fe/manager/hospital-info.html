<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thông tin bệnh viện – BV Mắt PTIT</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="../css/variables.css" rel="stylesheet">
  <link href="../css/base.css" rel="stylesheet">
  <link href="../css/components.css" rel="stylesheet">
  <link href="../css/layout.css" rel="stylesheet">
</head>
<body>
<div class="app-shell">

  <aside class="sidebar">
    <a href="" class="sidebar-brand">
      <div class="brand-logo"><svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:#fff" xmlns="http://www.w3.org/2000/svg"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zm0 12.5a5 5 0 1 1 0-10 5 5 0 0 1 0 10zm0-8a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"/></svg></div>
      <div class="brand-text">
        BV Mắt PTIT
        <small>Cổng Quản Lý</small>
      </div>
    </a>

    <nav class="sidebar-nav">
      <div class="nav-item">
        <a href="dashboard.html" class="nav-link-h">
          <span class="nav-icon"><i class="fas fa-chart-line"></i></span>
          <span class="nav-label">Tổng quan</span>
        </a>
      </div>
      <div class="nav-section-label">Quản lý</div>
      <div class="nav-item">
        <a href="appointments.html" class="nav-link-h">
          <span class="nav-icon"><i class="fas fa-calendar-days"></i></span>
          <span class="nav-label">Lịch hẹn</span>
          <span class="nav-badge">12</span>
        </a>
      </div>
      <div class="nav-item">
        <a href="departments.html" class="nav-link-h">
          <span class="nav-icon"><i class="fas fa-building-columns"></i></span>
          <span class="nav-label">Khoa phòng</span>
        </a>
      </div>
      <div class="nav-item">
        <a href="rooms.html" class="nav-link-h">
          <span class="nav-icon"><i class="fas fa-door-open"></i></span>
          <span class="nav-label">Phòng khám</span>
        </a>
      </div>
      <div class="nav-item">
        <a href="hospital-info.html" class="nav-link-h active">
          <span class="nav-icon"><i class="fas fa-hospital"></i></span>
          <span class="nav-label">Thông tin BV</span>
        </a>
      </div>
      <div class="nav-section-label">Báo cáo</div>
      <div class="nav-item">
        <a href="reports.html" class="nav-link-h">
          <span class="nav-icon"><i class="fas fa-file-chart-column"></i></span>
          <span class="nav-label">Báo cáo doanh thu</span>
        </a>
      </div>
      <div class="nav-item">
        <a href="reports.html" class="nav-link-h">
          <span class="nav-icon"><i class="fas fa-users"></i></span>
          <span class="nav-label">Báo cáo bệnh nhân</span>
        </a>
      </div>
    </nav>

    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="avatar avatar-md">QT</div>
        <div class="user-info">
          <div class="user-name">Nguyễn Quang Trung</div>
          <div class="user-role">Quản lý bệnh viện</div>
        </div>
        <i class="fas fa-ellipsis-v" style="color:rgba(255,255,255,0.4);font-size:13px"></i>
      </div>
    </div>
  </aside>

  <main class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <button class="topbar-icon-btn" id="sidebarToggle"><i class="fas fa-bars"></i></button>
        <div><div class="topbar-title">Thông tin bệnh viện</div><div style="font-size:12px;color:var(--text-muted)">Cập nhật thông tin giới thiệu</div></div>
      </div>
      <div class="topbar-right">
        <button class="btn-hospital btn-outline-h btn-sm" id="editToggle" onclick="toggleEdit()"><i class="fas fa-pen"></i> Chỉnh sửa</button>
        <button class="topbar-icon-btn">
          <i class="fas fa-bell"></i>
          <span class="notif-dot"></span>
        </button>
        <button class="topbar-user">
          <div class="avatar avatar-sm">QT</div>
          <div class="user-details d-none d-md-block">
            <span class="user-name">Quang Trung</span>
            <span class="user-role">Manager</span>
          </div>
          <i class="fas fa-chevron-down" style="font-size:11px;color:var(--text-muted)"></i>
        </button>
      </div>
    </header>

    <div class="content-area">
      <div class="card-hospital" style="max-width:800px">
        <div class="card-header-h">
          <h5><i class="fas fa-building" style="color:var(--primary);margin-right:8px"></i>Thông tin bệnh viện</h5>
        </div>
        <div class="card-body-h">
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label-h">Tên bệnh viện <span class="required">*</span></label>
              <input class="form-control-h" id="hospName" value="Bệnh viện Mắt – PTIT" disabled>
            </div>
            <div class="col-md-6">
              <label class="form-label-h">Địa chỉ <span class="required">*</span></label>
              <input class="form-control-h" id="hospAddress" value="1 Tôn Thất Tùng, Đống Đa, Hà Nội" disabled>
            </div>
            <div class="col-md-6">
              <label class="form-label-h">Số điện thoại</label>
              <input class="form-control-h" id="hospPhone" value="024 3852 3798" disabled>
            </div>
            <div class="col-md-6">
              <label class="form-label-h">Email liên hệ</label>
              <input class="form-control-h" id="hospEmail" value="contact@bvmatptit.edu.vn" disabled>
            </div>
            <div class="col-md-6">
              <label class="form-label-h">Website</label>
              <input class="form-control-h" id="hospWeb" value="https://bvmatptit.edu.vn" disabled>
            </div>
            <div class="col-12">
              <label class="form-label-h">Giờ làm việc</label>
              <input class="form-control-h" id="hospHours" value="Thứ 2 – Thứ 6: 07:00 – 17:00 | Thứ 7: 07:00 – 12:00" disabled>
            </div>
            <div class="col-12">
              <label class="form-label-h">Giới thiệu bệnh viện</label>
              <textarea class="form-control-h" id="hospDesc" rows="5" disabled>Bệnh viện Mắt – PTIT là cơ sở y tế chuyên khoa Mắt hàng đầu tại Việt Nam, trực thuộc Trường PTIT. Với đội ngũ chuyên gia đầu ngành, giáo sư, tiến sĩ giàu kinh nghiệm và hệ thống trang thiết bị hiện đại đạt tiêu chuẩn quốc tế, bệnh viện cung cấp các dịch vụ khám, chữa bệnh toàn diện về mắt cho người dân Hà Nội và các tỉnh thành lân cận.</textarea>
            </div>
          </div>
        </div>
        <div class="card-footer-h" id="saveFooter" style="display:none">
          <button class="btn-hospital btn-ghost-h btn-sm" onclick="cancelEdit()">Hủy</button>
          <button class="btn-hospital btn-primary-h btn-sm" onclick="saveInfo()"><i class="fas fa-check"></i> Lưu thay đổi</button>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="../js/sidebar.js"></script>
<script src="../js/manager-hospital-info.js"></script>
</body>
</html>
